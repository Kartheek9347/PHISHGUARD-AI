<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Context Analyzer - PhishGuard AI</title>
<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

<div class="navbar">
    <div class="logo">🛡️ PhishGuard AI</div>

    <div class="nav-links">
        <a href="/">Home</a>
        <a href="/features" class="active">Features</a>
        <a href="/about">About</a>

        {% if session.get('user') %}
            <div class="user-menu">
                <div class="user-btn" onclick="toggleMenu()">
                    👤 {{ session['user'] }}
                </div>
                <div class="dropdown" id="dropdownMenu">
                    <a href="/contact">Contact</a>
                    <a href="/logout">Logout</a>
                </div>
            </div>
        {% else %}
            <a href="/signin">Sign In</a>
        {% endif %}
    </div>
</div>
<div class="main">
    <div class="card">
        <h1>🧠 Context Analyzer</h1>
        <p>Understand email intent using NLP-based analysis</p>

        <form method="POST" action="/analyze_context">
            <textarea name="email" required placeholder="Paste email text here..."></textarea>
            <br>
            <button type="submit">Analyze Context</button>
        </form>
    </div>
</div>
<script>
function toggleMenu() {
    const menu = document.getElementById("dropdownMenu");
    menu.style.display = menu.style.display === "block" ? "none" : "block";
}

window.onclick = function(event) {
    if (!event.target.closest('.user-menu')) {
        const menu = document.getElementById("dropdownMenu");
        if(menu) menu.style.display = "none";
    }
}
</script>
</body>
</html>
